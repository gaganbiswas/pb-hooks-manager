<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hooks Manager</title>
    <style>
      :root {
        --bg-app: #ffffff;
        --bg-sidebar: #f9fafb;
        --border-color: #e5e7eb;
        --text-main: #111827;
        --text-muted: #6b7280;
        --danger: #dc2626;
        --accent: #2563eb;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, system-ui, sans-serif;
        background: var(--bg-app);
        color: var(--text-main);
      }

      .app-container {
        display: flex;
        height: 100vh;
      }

      .sidebar {
        width: 260px;
        min-width: 260px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
      }
      .sidebar-header {
        padding: 1.25rem;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .brand {
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
      }

      .search-box {
        padding: 0.6rem 0.75rem;
        border-bottom: 1px solid var(--border-color);
      }
      #search-input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 10px;
        font-size: 0.8rem;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: #fff;
        color: var(--text-main);
        outline: none;
      }
      #search-input:focus {
        border-color: var(--accent);
      }

      .tree {
        padding: 1rem;
        overflow-y: auto;
        font-size: 0.85rem;
        flex: 1;
      }
      .tree .empty {
        color: var(--text-muted);
        font-size: 0.8rem;
        padding: 0.5rem 0.6rem;
      }

      .folder-group {
        margin-bottom: 0.25rem;
      }
      .folder-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .folder-label {
        font-weight: 600;
        padding: 0.4rem 0;
        cursor: default;
      }
      .folder-children {
        margin-left: 0.75rem;
        border-left: 1px solid var(--border-color);
        padding-left: 0.75rem;
      }
      .tree-item {
        padding: 0.4rem 0.6rem;
        cursor: pointer;
        border-radius: 4px;
        color: var(--text-muted);
        transition: all 0.1s;
      }
      .tree-item:hover {
        background: #f3f4f6;
        color: var(--text-main);
      }
      .tree-item.active {
        background: #f3f4f6;
        color: var(--text-main);
      }

      .main-editor {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      /* Tab bar */
      .tabs-bar {
        display: flex;
        align-items: stretch;
        background: var(--bg-sidebar);
        border-bottom: 1px solid var(--border-color);
        overflow-x: auto;
        min-height: 38px;
      }
      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 0.5rem 0 0.85rem;
        border-right: 1px solid var(--border-color);
        font-size: 0.78rem;
        color: var(--text-muted);
        cursor: pointer;
        white-space: nowrap;
        max-width: 220px;
        user-select: none;
      }
      .tab:hover {
        background: #f3f4f6;
      }
      .tab.active {
        background: #fff;
        color: var(--text-main);
        box-shadow: inset 0 -2px 0 var(--accent);
      }
      .tab-name {
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tab .dirty-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }
      .tab-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 4px;
        font-size: 0.95rem;
        line-height: 1;
        color: var(--text-muted);
      }
      .tab-close:hover {
        background: #e5e7eb;
        color: var(--text-main);
      }

      .editor-header {
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        border-bottom: 1px solid var(--border-color);
      }
      #current-path {
        font-family: monospace;
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .editor-actions {
        display: flex;
        gap: 8px;
      }

      #editor-wrapper {
        position: relative;
        flex: 1;
        overflow: hidden;
        background: #fff;
      }
      .CodeMirror {
        height: 100% !important;
        font-family: "Fira Code", "SFMono-Regular", Consolas, monospace;
        font-size: 13px;
        line-height: 1.6;
      }

      button {
        background: #fff;
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 5px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 500;
      }
      .btn-primary {
        background: var(--text-main);
        color: #fff;
        border: none;
      }
      .btn-danger {
        color: var(--danger);
        border: none;
        background: transparent;
      }
      .btn-icon-small {
        padding: 0 4px;
        opacity: 0;
        font-size: 1rem;
      }
      .folder-header:hover .btn-icon-small {
        opacity: 1;
      }
      button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      #save-btn:disabled {
        background: #f3f4f6;
        color: #9ca3af;
        border: 1px solid var(--border-color);
        cursor: not-allowed;
        opacity: 0.7;
      }
      #save-btn {
        transition: all 0.2s ease;
      }

      .route-list {
        margin-left: 1.5rem;
        margin-bottom: 0.5rem;
        border-left: 1px dashed var(--border-color);
        padding-left: 0.5rem;
      }
      .route-entry {
        font-size: 0.7rem;
        font-family: monospace;
        padding: 2px 0;
        display: flex;
        gap: 6px;
        align-items: center;
        color: var(--text-muted);
      }
      .method {
        font-weight: bold;
        font-size: 0.6rem;
        padding: 1px 4px;
        border-radius: 3px;
        text-transform: uppercase;
      }
      .method.get {
        background: #dcfce7;
        color: #166534;
      }
      .method.post {
        background: #dbeafe;
        color: #1e40af;
      }
      .method.put {
        background: #fef9c3;
        color: #854d0e;
      }
      .method.delete {
        background: #fee2e2;
        color: #991b1b;
      }
      .route-entry .path {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Saving loader overlay - blocks all interaction (incl. switching links) */
      #loader {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(1px);
        align-items: center;
        justify-content: center;
      }
      #loader .loader-card {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fff;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 12px 18px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        font-size: 0.8rem;
        color: var(--text-main);
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--border-color);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <a class="logo logo-sm"
            ><img
              src="../_/images/logo.svg"
              alt="PocketBase logo"
              width="40"
              height="40"
          /></a>
          <div class="header-actions">
            <button onclick="createNewFile()">+ File</button>
            <button onclick="createNewFolder()">+ Folder</button>
          </div>
        </div>
        <div class="search-box">
          <input
            id="search-input"
            type="text"
            placeholder="Search route or file…"
            autocomplete="off"
            spellcheck="false"
            oninput="onSearch()"
          />
        </div>
        <div id="file-tree" class="tree"></div>
      </aside>

      <main class="main-editor">
        <div id="tabs-bar" class="tabs-bar"></div>
        <header class="editor-header">
          <span id="current-path">no file selected</span>
          <div class="editor-actions">
            <button id="format-btn" disabled onclick="formatCode()">
              Format
            </button>
            <button
              id="delete-btn"
              disabled
              onclick="deleteItem()"
              class="btn-danger"
            >
              Delete
            </button>
            <button
              id="save-btn"
              disabled
              onclick="saveCurrent()"
              class="btn-primary"
            >
              Saved
            </button>
          </div>
        </header>

        <div id="editor-wrapper"></div>
      </main>
    </div>

    <div id="loader">
      <div class="loader-card">
        <div class="spinner"></div>
        <span id="loader-text">Saving…</span>
      </div>
    </div>

    <script>
      // piggyback admin token from /_ dashboard
      const SUPERUSER_TOKEN = JSON.parse(
        localStorage.getItem("pb_admin_auth")
      )?.token;

      if (
        !SUPERUSER_TOKEN ||
        JSON.parse(atob(SUPERUSER_TOKEN.split(".")[1])).exp <
          Math.round(Date.now() / 1000)
      ) {
        window.location.href = window.location.origin + "/_/#/login";
      }

      // ---- State ----------------------------------------------------------
      let treeData = []; // last fetched folder tree
      let tabs = []; // [{ path, savedContent, doc }]
      let activeTabPath = null;
      let isBusy = false; // true while a save/network op is in flight

      let cm; // CodeMirror instance
      let saveBtn, formatBtn, deleteBtn, pathLabel;

      // ---- Network --------------------------------------------------------
      async function pbFetch(url, options = {}) {
        options.headers = {
          ...options.headers,
          Authorization: SUPERUSER_TOKEN,
        };
        const res = await fetch(url, options);
        if (res.status === 401 || res.status === 403)
          window.location.href = window.location.origin + "/_/#/login";
        return res;
      }

      // ---- Loader (blocks switching links while saving) -------------------
      function showLoader(text = "Saving…") {
        isBusy = true;
        document.getElementById("loader-text").innerText = text;
        document.getElementById("loader").style.display = "flex";
      }
      function hideLoader() {
        isBusy = false;
        document.getElementById("loader").style.display = "none";
      }

      // ---- Tab helpers ----------------------------------------------------
      function getTab(path) {
        return tabs.find((t) => t.path === path) || null;
      }
      function getActiveTab() {
        return getTab(activeTabPath);
      }
      function isDirty(tab) {
        return tab && tab.doc.getValue() !== tab.savedContent;
      }

      function updateSaveButton() {
        const tab = getActiveTab();
        if (!tab) {
          saveBtn.disabled = true;
          saveBtn.innerText = "Saved";
          return;
        }
        if (isDirty(tab)) {
          saveBtn.disabled = false;
          saveBtn.innerText = "Save";
        } else {
          saveBtn.disabled = true;
          saveBtn.innerText = "Saved";
        }
      }

      function renderTabs() {
        const bar = document.getElementById("tabs-bar");
        bar.innerHTML = "";
        tabs.forEach((tab) => {
          const el = document.createElement("div");
          el.className = "tab" + (tab.path === activeTabPath ? " active" : "");
          el.title = tab.path;
          el.onclick = () => activateTab(tab.path);

          const name = document.createElement("span");
          name.className = "tab-name";
          name.innerText = tab.path.split("/").pop();
          el.appendChild(name);

          if (isDirty(tab)) {
            const dot = document.createElement("span");
            dot.className = "dirty-dot";
            el.appendChild(dot);
          }

          const close = document.createElement("span");
          close.className = "tab-close";
          close.title = "Close (autosaves changes)";
          close.innerHTML = "&times;";
          close.onclick = (ev) => closeTab(tab.path, ev);
          el.appendChild(close);

          bar.appendChild(el);
        });
      }

      function clearEditor() {
        activeTabPath = null;
        cm.swapDoc(CodeMirror.Doc("", "javascript"));
        cm.setOption("readOnly", true);
        pathLabel.innerText = "no file selected";
        deleteBtn.disabled = true;
        formatBtn.disabled = true;
        updateSaveButton();
        renderTabs();
        const url = new URL(window.location);
        url.searchParams.delete("file");
        window.history.replaceState({}, "", url);
      }

      function activateTab(path) {
        if (isBusy) return;
        const tab = getTab(path);
        if (!tab) return;
        activeTabPath = path;
        cm.swapDoc(tab.doc);
        cm.setOption("readOnly", false);
        pathLabel.innerText = path;
        deleteBtn.disabled = false;
        formatBtn.disabled = false;
        updateSaveButton();
        renderTabs();
        renderCurrentTree();

        const url = new URL(window.location);
        url.searchParams.set("file", path);
        window.history.replaceState({}, "", url);
        cm.focus();
      }

      // ---- File operations ------------------------------------------------
      async function openFile(path) {
        if (isBusy) return;
        const existing = getTab(path);
        if (existing) {
          activateTab(path);
          return;
        }

        showLoader("Loading…");
        const res = await pbFetch(`/hooks-manager/file?path=${path}`);
        if (!res.ok) {
          hideLoader();
          return;
        }
        const content = await res.text();
        hideLoader();

        const doc = CodeMirror.Doc(content, "javascript");
        tabs.push({ path, savedContent: content, doc });
        activateTab(path);
      }

      function beautify(code) {
        return js_beautify(code, {
          indent_size: 2,
          space_in_empty_paren: true,
          end_with_newline: true,
        });
      }

      async function saveTab(tab) {
        // Auto-format before persisting so saved files stay tidy.
        const content = beautify(tab.doc.getValue());
        if (content !== tab.doc.getValue()) {
          if (tab.path === activeTabPath) {
            const cursor = cm.getCursor();
            tab.doc.setValue(content);
            cm.setCursor(cursor);
          } else {
            tab.doc.setValue(content);
          }
        }
        const res = await pbFetch(`/hooks-manager/file?path=${tab.path}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: content }),
        });
        if (res.ok) tab.savedContent = content;
        return res.ok;
      }

      async function saveCurrent() {
        const tab = getActiveTab();
        if (!tab || !isDirty(tab) || isBusy) return;

        showLoader("Saving…");
        await saveTab(tab);
        await fetchTree(); // refresh parsed routes in the sidebar
        hideLoader();

        updateSaveButton();
        renderTabs();
      }

      // Autosave-on-close: closing a tab persists its changes first.
      async function closeTab(path, ev) {
        if (ev) ev.stopPropagation();
        if (isBusy) return;
        const tab = getTab(path);
        if (!tab) return;

        if (isDirty(tab)) {
          showLoader("Saving…");
          await saveTab(tab);
          await fetchTree();
          hideLoader();
        }

        const idx = tabs.indexOf(tab);
        tabs.splice(idx, 1);

        if (activeTabPath === path) {
          const next = tabs[idx] || tabs[idx - 1] || null;
          if (next) activateTab(next.path);
          else clearEditor();
        } else {
          renderTabs();
        }
      }

      function formatCode() {
        const tab = getActiveTab();
        if (!tab || isBusy) return;
        const formatted = beautify(tab.doc.getValue());
        if (formatted === tab.doc.getValue()) return;
        const cursor = cm.getCursor();
        cm.setValue(formatted);
        cm.setCursor(cursor);
        updateSaveButton();
        renderTabs();
      }

      async function createNewFile() {
        let name = prompt("File name:");
        if (!name) return;
        if (!name.endsWith(".pb.js")) name = name.split(".")[0] + ".pb.js";

        const initialContent = `routerAdd("GET", "/api/${
          name.split(".")[0]
        }", (e) => {\n  return e.json(200, { "message": "hello" });\n});\n`;

        showLoader("Creating…");
        await pbFetch(`/hooks-manager/file?path=${name}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: initialContent }),
        });
        await fetchTree();
        hideLoader();
        openFile(name);
      }

      async function createNewFolder() {
        const name = prompt("Folder name:");
        if (!name) return;
        showLoader("Creating…");
        await pbFetch(`/hooks-manager/folder?path=${name}`, { method: "PUT" });
        await fetchTree();
        hideLoader();
      }

      async function deleteItem(path) {
        const target = path || activeTabPath;
        if (!target || isBusy || !confirm(`Delete ${target}?`)) return;

        showLoader("Deleting…");
        await pbFetch(`/hooks-manager/file?path=${target}`, {
          method: "DELETE",
        });
        await fetchTree();
        hideLoader();

        // Drop any open tab pointing at the deleted path (no autosave - it's gone).
        const tab = getTab(target);
        if (tab) {
          const idx = tabs.indexOf(tab);
          tabs.splice(idx, 1);
          if (activeTabPath === target) {
            const next = tabs[idx] || tabs[idx - 1] || null;
            if (next) activateTab(next.path);
            else clearEditor();
          }
        }
        renderTabs();
      }

      // ---- Tree + search --------------------------------------------------
      async function fetchTree() {
        const res = await pbFetch(`/hooks-manager/folder`);
        if (!res.ok) return;
        treeData = await res.json();
        renderCurrentTree();
      }

      // Keep files whose name OR any route (method/path) matches the query.
      // Keep folders that match by name or that contain a matching descendant.
      function filterTree(data, q) {
        const result = [];
        for (const item of data) {
          if (typeof item === "object" && !item.type) {
            const name = Object.keys(item)[0];
            const children = filterTree(item[name], q);
            if (name.toLowerCase().includes(q) || children.length) {
              const folder = {};
              folder[name] = name.toLowerCase().includes(q)
                ? item[name]
                : children;
              result.push(folder);
            }
          } else {
            const nameMatch = item.name.toLowerCase().includes(q);
            const routeMatch = (item.routes || []).some(
              (r) =>
                r.path.toLowerCase().includes(q) ||
                r.method.toLowerCase().includes(q)
            );
            if (nameMatch || routeMatch) result.push(item);
          }
        }
        return result;
      }

      function onSearch() {
        renderCurrentTree();
      }

      function renderCurrentTree() {
        const q = document.getElementById("search-input").value.trim().toLowerCase();
        const data = q ? filterTree(treeData, q) : treeData;
        const container = document.getElementById("file-tree");
        renderTree(data, container);
        if (data.length === 0) {
          container.innerHTML = `<div class="empty">${
            q ? "No matches" : "No hooks yet"
          }</div>`;
        }
      }

      function renderTree(data, container, parentPath = "") {
        container.innerHTML = "";
        data.forEach((item) => {
          const el = document.createElement("div");

          if (typeof item === "object" && !item.type) {
            // Folder
            const name = Object.keys(item)[0];
            const full = parentPath ? `${parentPath}/${name}` : name;
            el.className = "folder-group";
            el.innerHTML = `
                <div class="folder-header">
                    <span class="folder-label"><svg width='12' height='12' xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 16 16">
  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12.667A1.334 1.334 0 0 1 13.667 14H2.333A1.334 1.334 0 0 1 1 12.667V3.333A1.333 1.333 0 0 1 2.333 2H5.5L7 4h6.667A1.333 1.333 0 0 1 15 5.333v7.334Z"/>
</svg> ${name}</span>
                    <button class="btn-icon-small btn-danger" onclick="deleteItem('${full}')"><svg width='12' height='12' xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 16 16">
  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5.5 4V2.25A1.25 1.25 0 0 1 6.75 1h2.5a1.25 1.25 0 0 1 1.25 1.25V4M2 4h12m-1 0v9.625A1.375 1.375 0 0 1 11.625 15h-7.25A1.375 1.375 0 0 1 3 13.625V4h10Z"/>
</svg></button>
                </div>
                <div class="folder-children"></div>`;
            renderTree(item[name], el.querySelector(".folder-children"), full);
          } else {
            // File
            const full = parentPath ? `${parentPath}/${item.name}` : item.name;
            const activeClass = activeTabPath === full ? "active" : "";

            let routesHtml = (item.routes || [])
              .map(
                (r) => `
                <div class="route-entry">
                    <span class="method ${r.method.toLowerCase()}">${
                  r.method
                }</span>
                    <span class="path">${r.path}</span>
                </div>`
              )
              .join("");

            el.innerHTML = `
                <div class="tree-item ${activeClass}" onclick="openFile('${full}')"><svg width='12' height='12' xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 16 16">
  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 1H3.4A1.4 1.4 0 0 0 2 2.4v11.2A1.4 1.4 0 0 0 3.4 15h9.2a1.4 1.4 0 0 0 1.4-1.4V5m-4-4 4 4m-4-4v4h4"/>
</svg> ${item.name}</div>
                <div class="route-list">${routesHtml}</div>`;
          }
          container.appendChild(el);
        });
      }

      // ---- Boot -----------------------------------------------------------
      window.onload = async () => {
        saveBtn = document.getElementById("save-btn");
        formatBtn = document.getElementById("format-btn");
        deleteBtn = document.getElementById("delete-btn");
        pathLabel = document.getElementById("current-path");

        cm = CodeMirror(document.getElementById("editor-wrapper"), {
          value: "",
          mode: "javascript",
          lineNumbers: true,
          indentUnit: 2,
          tabSize: 2,
          indentWithTabs: false,
          matchBrackets: true,
          readOnly: true,
          extraKeys: {
            "Cmd-S": () => saveCurrent(),
            "Ctrl-S": () => saveCurrent(),
            "Shift-Alt-F": () => formatCode(),
          },
        });

        cm.on("change", () => {
          updateSaveButton();
          renderTabs();
        });

        // Warn on hard navigation away with unsaved work.
        window.addEventListener("beforeunload", (e) => {
          if (tabs.some((t) => isDirty(t))) {
            e.preventDefault();
            e.returnValue = "";
          }
        });

        await fetchTree();
        const file = new URLSearchParams(window.location.search).get("file");
        if (file) openFile(file);
      };
    </script>
  </body>
</html>
